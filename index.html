<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BairesDev — Meeting Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  /* BairesDev brand palette */
  --orange:#F05A28;
  --orange-light:#FFF0EB;
  --orange-mid:#FDD5C5;
  --orange-dark:#C44316;
  --orange-deep:#8A2E0D;
 
  /* Surfaces */
  --white:#FFFFFF;
  --bg:#F4F5F7;
  --surface:#FFFFFF;
  --surface2:#F9FAFB;
  --surface3:#F1F3F6;
 
  /* Text */
  --text:#0D0D0D;
  --text2:#4B5563;
  --text3:#9CA3AF;
  --text4:#C9D0D9;
 
  /* Borders */
  --border:#E5E8EE;
  --border2:#D1D5DB;
  --border3:#B8BEC8;
 
  /* Status colors */
  --g:#16A34A; --g-bg:#DCFCE7; --g-b:#BBF7D0; --g-text:#14532D;
  --y:#B45309; --y-bg:#FEF3C7; --y-b:#FDE68A; --y-text:#78350F;
  --r:#DC2626; --r-bg:#FEE2E2; --r-b:#FECACA; --r-text:#7F1D1D;
  --b:#2563EB; --b-bg:#DBEAFE; --b-b:#BFDBFE; --b-text:#1E3A8A;
 
  /* Type */
  --font:'DM Sans',sans-serif;
  --mono:'JetBrains Mono',monospace;
  --radius:8px;--radius-lg:12px;--radius-xl:16px;
 
  /* Layout */
  --sidebar:268px;
}
html{scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:15px;line-height:1.6;height:100vh;overflow:hidden;display:flex}
button{font-family:var(--font);cursor:pointer}
input,textarea,select{font-family:var(--font)}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--border3)}
 
/* ══ SIDEBAR ══ */
#sidebar{width:var(--sidebar);min-width:var(--sidebar);background:var(--white);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh;overflow:hidden;transition:transform .25s}
.sb-top{padding:18px 16px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
.sb-logo{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.logo-icon{width:34px;height:34px;flex-shrink:0}
.logo-txt{font-size:17px;font-weight:700;color:var(--text);letter-spacing:-.02em}
.logo-txt span{color:var(--orange)}
.new-btn{width:100%;padding:10px;background:var(--orange);color:#fff;font-weight:600;font-size:13px;border:none;border-radius:var(--radius);transition:background .15s;letter-spacing:.01em}
.new-btn:hover{background:var(--orange-dark)}
 
.sb-user{padding:10px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:9px;flex-shrink:0}
.user-avatar{width:30px;height:30px;background:var(--orange-light);border:1.5px solid var(--orange-mid);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--orange);flex-shrink:0}
.user-name{font-size:12px;color:var(--text2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500}
.user-change{font-size:11px;color:var(--text3);background:none;border:none;padding:0;cursor:pointer}
.user-change:hover{color:var(--orange)}
 
.sb-label{font-family:var(--mono);font-size:9px;color:var(--text3);letter-spacing:.12em;text-transform:uppercase;padding:14px 16px 6px;flex-shrink:0}
.sb-calls{flex:1;overflow-y:auto;padding:0 8px 8px}
.sb-item{padding:9px 10px;border-radius:var(--radius);cursor:pointer;margin-bottom:3px;display:flex;align-items:flex-start;gap:8px;border:1px solid transparent;transition:all .12s;position:relative}
.sb-item:hover{background:var(--surface2);border-color:var(--border)}
.sb-item.active{background:var(--orange-light);border-color:var(--orange-mid)}
.sb-type{font-family:var(--mono);font-size:9px;font-weight:500;padding:2px 6px;border-radius:3px;letter-spacing:.04em;flex-shrink:0;margin-top:2px}
.sb-type.ot{background:var(--orange-light);color:var(--orange);border:1px solid var(--orange-mid)}
.sb-type.on{background:#EEE8FF;color:#6D28D9;border:1px solid #DDD6FE}
.sb-info{flex:1;min-width:0}
.sb-name{font-size:12px;font-weight:500;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.4}
.sb-date{font-size:11px;color:var(--text3);margin-top:1px}
.sb-del{opacity:0;background:var(--r-bg);border:1px solid var(--r-b);color:var(--r);border-radius:4px;width:22px;height:22px;font-size:15px;display:flex;align-items:center;justify-content:center;padding:0;flex-shrink:0;transition:all .12s;margin-top:2px}
.sb-item:hover .sb-del{opacity:1}
.sb-del:hover{background:var(--r-b)}
.sb-empty{padding:24px 16px;text-align:center;font-size:12px;color:var(--text3);line-height:1.7}
 
/* ══ MAIN ══ */
#main{flex:1;height:100vh;overflow-y:auto;display:flex;flex-direction:column;background:var(--bg)}
 
/* ══ TOPBAR ══ */
.topbar{height:54px;background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 28px;gap:12px;flex-shrink:0;position:sticky;top:0;z-index:50}
.topbar-title{font-size:14px;font-weight:600;color:var(--text);flex:1}
.topbar-badge{font-family:var(--mono);font-size:10px;color:var(--orange);background:var(--orange-light);border:1px solid var(--orange-mid);padding:3px 9px;border-radius:3px;letter-spacing:.05em}
.mob-menu{display:none;background:none;border:none;color:var(--text2);font-size:20px;padding:4px;margin-right:4px}
.back-btn{display:flex;align-items:center;gap:5px;background:none;border:1px solid var(--border2);color:var(--text2);font-size:12px;padding:5px 12px;border-radius:var(--radius);transition:all .15s;font-weight:500}
.back-btn:hover{border-color:var(--border3);color:var(--text);background:var(--surface2)}
 
/* ══ PAGE ══ */
.page{max-width:820px;margin:0 auto;padding:28px 24px 60px;width:100%}
 
/* ══ HOME ══ */
.home-greeting{margin-bottom:28px}
.home-greeting h1{font-size:22px;font-weight:700;letter-spacing:-.02em;margin-bottom:4px;color:var(--text)}
.home-greeting h1 span{color:var(--orange)}
.home-greeting p{font-size:14px;color:var(--text2)}
.home-cards{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:32px}
.hcard{background:var(--white);border:1.5px solid var(--border);border-radius:var(--radius-xl);padding:24px 22px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.hcard::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px}
.hcard.ot::after{background:var(--orange)}
.hcard.on::after{background:#7C3AED}
.hcard:hover{border-color:var(--border3);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.07)}
.hcard.ot:hover{border-color:var(--orange-mid)}
.hcard.on:hover{border-color:#DDD6FE}
.hcard-icon{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:14px;font-size:20px}
.hcard-icon.ot{background:var(--orange-light)}
.hcard-icon.on{background:#EEE8FF}
.hcard-title{font-size:16px;font-weight:700;margin-bottom:4px;letter-spacing:-.02em;color:var(--text)}
.hcard-sub{font-size:12px;color:var(--text2);line-height:1.55;margin-bottom:16px}
.hcard-cta{font-size:12px;font-weight:600;display:flex;align-items:center;gap:4px}
.hcard-cta.ot{color:var(--orange)}
.hcard-cta.on{color:#7C3AED}
 
.home-recent-lbl{font-family:var(--mono);font-size:9px;color:var(--text3);letter-spacing:.12em;text-transform:uppercase;margin-bottom:10px}
.recent-list{display:flex;flex-direction:column;gap:5px}
.rec-item{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px;cursor:pointer;display:flex;align-items:center;gap:12px;transition:all .12s}
.rec-item:hover{border-color:var(--border3);box-shadow:0 2px 8px rgba(0,0,0,.05)}
.rec-type{font-family:var(--mono);font-size:9px;padding:3px 7px;border-radius:3px;letter-spacing:.04em;flex-shrink:0}
.rec-type.ot{background:var(--orange-light);color:var(--orange)}
.rec-type.on{background:#EEE8FF;color:#6D28D9}
.rec-info{flex:1;min-width:0}
.rec-name{font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rec-date{font-size:11px;color:var(--text3);margin-top:1px}
.rec-arr{color:var(--text3);font-size:16px}
 
/* ══ FORM ══ */
.meta-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;margin-bottom:22px}
.fld label{display:block;font-family:var(--mono);font-size:9px;color:var(--text3);letter-spacing:.12em;text-transform:uppercase;margin-bottom:5px}
.fld input,.fld select{width:100%;background:var(--white);border:1.5px solid var(--border2);color:var(--text);padding:9px 12px;border-radius:var(--radius);font-size:13px;outline:none;transition:border-color .18s;font-weight:500}
.fld input:focus,.fld select:focus{border-color:var(--orange)}
.fld select option{background:var(--white)}
.fld input::placeholder{color:var(--text3);font-weight:400}
 
/* section card */
.sc{background:var(--white);border:1.5px solid var(--border);border-radius:var(--radius-lg);margin-bottom:12px;overflow:hidden}
.sc-hdr{background:var(--surface2);padding:11px 18px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.sc-tag{font-family:var(--mono);font-size:9px;font-weight:500;color:var(--orange);background:var(--orange-light);border:1px solid var(--orange-mid);padding:2px 8px;border-radius:3px;letter-spacing:.07em;text-transform:uppercase;white-space:nowrap}
.sc-tag.purple{color:#6D28D9;background:#EEE8FF;border-color:#DDD6FE}
.sc-ttl{font-size:13px;font-weight:600;color:var(--text)}
 
/* prompt hint */
.ph{margin:12px 18px 0;padding:9px 13px;background:#F0F5FF;border-left:3px solid #93C5FD;border-radius:0 var(--radius) var(--radius) 0}
.ph-lbl{font-family:var(--mono);font-size:9px;color:#3B82F6;letter-spacing:.09em;text-transform:uppercase;margin-bottom:2px}
.ph-txt{font-size:12px;color:#2563EB;font-style:italic;line-height:1.4;font-weight:400}
 
/* question */
.qw{padding:16px 18px;border-bottom:1px solid var(--border)}
.qw:last-child{border-bottom:none}
.ql{font-size:13px;font-weight:500;color:var(--text);margin-bottom:10px;line-height:1.5}
.qi{font-family:var(--mono);font-size:10px;color:var(--text3);margin-right:5px;font-weight:400}
.br{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.ab{font-size:12px;font-weight:500;padding:6px 13px;border-radius:6px;border:1.5px solid;cursor:pointer;transition:all .12s;background:transparent;line-height:1.3;outline:none}
.ab:hover{transform:translateY(-1px)}
.ab:active{transform:scale(.97)}
.ab.g{color:var(--g-text);border-color:var(--g-b);background:var(--g-bg)}
.ab.g.on{background:var(--g);color:#fff;border-color:var(--g)}
.ab.y{color:var(--y-text);border-color:var(--y-b);background:var(--y-bg)}
.ab.y.on{background:#D97706;color:#fff;border-color:#D97706}
.ab.r{color:var(--r-text);border-color:var(--r-b);background:var(--r-bg)}
.ab.r.on{background:var(--r);color:#fff;border-color:var(--r)}
.ab.b{color:var(--b-text);border-color:var(--b-b);background:var(--b-bg)}
.ab.b.on{background:var(--b);color:#fff;border-color:var(--b)}
.cmt{width:100%;background:var(--surface2);border:1.5px solid var(--border);color:var(--text);padding:8px 12px;border-radius:var(--radius);font-size:13px;resize:vertical;min-height:54px;outline:none;transition:border-color .18s;line-height:1.5}
.cmt:focus{border-color:var(--orange)}
.cmt::placeholder{color:var(--text3)}
 
/* team table */
.ttw{margin-top:4px;overflow-x:auto}
.tt{width:100%;border-collapse:collapse;min-width:480px}
.tt th{font-family:var(--mono);font-size:9px;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;padding:7px 8px;border-bottom:1.5px solid var(--border);text-align:left;background:var(--surface2)}
.tt td{padding:5px 6px;border-bottom:1px solid var(--border);vertical-align:middle}
.tt tr:last-child td{border-bottom:none}
.ti{width:100%;background:var(--white);border:1.5px solid var(--border);color:var(--text);padding:6px 9px;border-radius:6px;font-size:12px;outline:none;transition:border-color .15s}
.ti:focus{border-color:var(--orange)}
.ti::placeholder{color:var(--text3)}
.sg{display:flex;gap:3px}
.sb2{width:28px;height:28px;border-radius:5px;border:1.5px solid var(--border);background:var(--white);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:all .12s;padding:0}
.sb2:hover{transform:scale(1.08)}
.sb2.pos.sel{background:var(--g-bg);border-color:var(--g-b)}
.sb2.neu.sel{background:var(--y-bg);border-color:var(--y-b)}
.sb2.neg.sel{background:var(--r-bg);border-color:var(--r-b)}
.rm{width:24px;height:24px;background:var(--r-bg);border:1.5px solid var(--r-b);color:var(--r);border-radius:5px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;padding:0;transition:all .12s}
.rm:hover{background:var(--r-b)}
.add-row{margin-top:8px;font-family:var(--mono);font-size:11px;color:var(--orange);background:var(--orange-light);border:1.5px solid var(--orange-mid);padding:6px 13px;border-radius:var(--radius);cursor:pointer;transition:all .12s;letter-spacing:.04em;display:inline-flex;align-items:center;gap:5px;font-weight:500}
.add-row:hover{background:var(--orange-mid)}
 
/* ERP toggles */
.er{display:flex;align-items:center;padding:10px 18px;border-bottom:1px solid var(--border);gap:10px}
.er:last-of-type{border-bottom:none}
.el{flex:1;font-size:13px;color:var(--text2);line-height:1.4}
.tg{display:flex;gap:4px;flex-shrink:0}
.tb{font-family:var(--mono);font-size:11px;font-weight:500;padding:5px 13px;border-radius:6px;border:1.5px solid;cursor:pointer;transition:all .12s;background:transparent;letter-spacing:.04em;outline:none}
.tb:hover{transform:translateY(-1px)}
.tb.yes{color:var(--r-text);border-color:var(--r-b);background:var(--r-bg)}
.tb.yes.on{background:var(--r);color:#fff;border-color:var(--r)}
.tb.no{color:var(--g-text);border-color:var(--g-b);background:var(--g-bg)}
.tb.no.on{background:var(--g);color:#fff;border-color:var(--g)}
.ec{padding:12px 18px;border-top:1px solid var(--border)}
 
/* transcript */
.txup{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.fl{font-family:var(--mono);font-size:11px;color:var(--text2);border:1.5px solid var(--border2);padding:6px 13px;border-radius:var(--radius);cursor:pointer;transition:all .15s;letter-spacing:.03em;font-weight:500}
.fl:hover{border-color:var(--orange);color:var(--orange)}
.fn{font-size:11px;color:var(--text3)}
.tdiv{text-align:center;font-size:10px;color:var(--text3);margin:7px 0;font-family:var(--mono);letter-spacing:.07em}
.txa{width:100%;background:var(--surface2);border:1.5px solid var(--border);color:var(--text);padding:10px 12px;border-radius:var(--radius);font-size:13px;resize:vertical;min-height:80px;outline:none;transition:border-color .18s;line-height:1.5}
.txa:focus{border-color:var(--orange)}
.txa::placeholder{color:var(--text3)}
.az-btn{font-family:var(--mono);font-size:11px;font-weight:500;padding:8px 18px;background:var(--orange);color:#fff;border:none;border-radius:var(--radius);cursor:pointer;transition:all .15s;text-transform:uppercase;letter-spacing:.05em;margin-top:10px;display:inline-flex;align-items:center;gap:6px}
.az-btn:hover{background:var(--orange-dark)}
.az-btn:disabled{background:var(--orange-mid);cursor:not-allowed}
.ib{margin-top:12px;background:#F0FDF4;border:1.5px solid #BBF7D0;border-radius:var(--radius);padding:12px 14px}
.ib-ttl{font-family:var(--mono);font-size:9px;color:var(--g);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:5px}
.ib-ttl::before{content:'';display:inline-block;width:5px;height:5px;background:var(--g);border-radius:50%}
.ii{display:flex;gap:7px;font-size:12px;color:var(--text2);line-height:1.5;margin-bottom:6px}
.ii:last-child{margin-bottom:0}
.id2{color:var(--orange);flex-shrink:0;font-weight:700}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:14px;height:14px;border:2px solid var(--border2);border-top-color:var(--orange);border-radius:50%;animation:spin .8s linear infinite}
.analyzing{padding:14px;text-align:center;font-size:12px;color:var(--text3);display:flex;align-items:center;justify-content:center;gap:8px}
 
/* progress */
.prog-wrap{height:3px;background:var(--border);border-radius:2px;margin-bottom:16px;overflow:hidden}
.prog-fill{height:100%;background:var(--orange);border-radius:2px;transition:width .4s}
 
/* legend */
.legend{display:flex;gap:14px;flex-wrap:wrap;padding:10px 14px;background:var(--white);border:1.5px solid var(--border);border-radius:var(--radius);margin-bottom:14px}
.leg{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2)}
.ld{width:8px;height:8px;border-radius:2px;flex-shrink:0}
 
/* save bar */
.save-bar{background:var(--white);border-top:1.5px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.save-btn{background:var(--orange);color:#fff;font-weight:700;font-size:13px;padding:11px 28px;border:none;border-radius:var(--radius);cursor:pointer;transition:all .18s;letter-spacing:.01em}
.save-btn:hover{background:var(--orange-dark);transform:translateY(-1px)}
.save-hint{font-size:12px;color:var(--text3)}
 
/* detail / summary */
.detail-meta{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:20px}
.mc{background:var(--white);border:1.5px solid var(--border);border-radius:var(--radius);padding:10px 14px}
.mc-lbl{font-family:var(--mono);font-size:9px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:3px}
.mc-val{font-size:13px;font-weight:600;color:var(--text)}
.sum-wrap{background:var(--white);border:1.5px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.sum-hdr{background:var(--surface2);padding:12px 18px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;border-bottom:1px solid var(--border)}
.sum-ttl{font-family:var(--mono);font-size:10px;color:var(--text2);letter-spacing:.08em;text-transform:uppercase}
.copy-btn{font-family:var(--mono);font-size:11px;font-weight:500;letter-spacing:.05em;padding:6px 14px;border:1.5px solid var(--border2);border-radius:var(--radius);background:var(--white);color:var(--text2);cursor:pointer;transition:all .15s;text-transform:uppercase}
.copy-btn:hover{border-color:var(--orange);color:var(--orange)}
.copy-btn.ok{border-color:var(--g);color:var(--g);background:var(--g-bg)}
.del-btn{font-family:var(--mono);font-size:11px;font-weight:500;letter-spacing:.05em;padding:6px 14px;border:1.5px solid var(--r-b);border-radius:var(--radius);background:var(--r-bg);color:var(--r);cursor:pointer;transition:all .15s;text-transform:uppercase}
.del-btn:hover{background:var(--r-b)}
#sum-out{padding:22px;font-family:var(--mono);font-size:12px;line-height:1.9;color:var(--text2);white-space:pre-wrap;background:var(--surface2);overflow-x:auto;border-top:1px solid var(--border)}
 
/* 1:1 mood rating */
.mood-row{display:flex;gap:5px;margin-bottom:8px;flex-wrap:wrap}
.rate-btn{width:34px;height:34px;border-radius:6px;border:1.5px solid var(--border);background:var(--white);color:var(--text2);font-size:12px;font-weight:600;cursor:pointer;transition:all .12s;display:flex;align-items:center;justify-content:center}
.rate-btn:hover{border-color:var(--orange);color:var(--orange)}
.rate-btn.on{background:var(--orange-light);border-color:var(--orange-mid);color:var(--orange);font-weight:700}
.mood-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--text3);margin-bottom:10px;font-family:var(--mono)}
 
/* modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--white);border:1.5px solid var(--border);border-radius:var(--radius-xl);padding:32px;max-width:420px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.modal-logo{display:flex;align-items:center;gap:10px;margin-bottom:20px}
.modal h2{font-size:20px;font-weight:700;letter-spacing:-.02em;margin-bottom:6px;color:var(--text)}
.modal p{font-size:13px;color:var(--text2);margin-bottom:20px;line-height:1.6}
.modal-input{width:100%;background:var(--surface2);border:1.5px solid var(--border2);color:var(--text);padding:11px 14px;border-radius:var(--radius);font-size:14px;outline:none;margin-bottom:14px;transition:border-color .18s;font-weight:500}
.modal-input:focus{border-color:var(--orange)}
.modal-input::placeholder{color:var(--text3);font-weight:400}
.modal-btn{width:100%;padding:13px;background:var(--orange);color:#fff;font-weight:700;font-size:14px;border:none;border-radius:var(--radius);cursor:pointer;transition:background .15s;letter-spacing:.01em}
.modal-btn:hover{background:var(--orange-dark)}
 
/* insights purple variant for 1:1 */
.ib.purple{background:#F5F3FF;border-color:#DDD6FE}
.ib.purple .ib-ttl{color:#7C3AED}
.ib.purple .ib-ttl::before{background:#7C3AED}
.ib.purple .id2{color:#7C3AED}
 
@media(max-width:768px){
  body{overflow:auto;flex-direction:column;height:auto}
  #sidebar{position:fixed;top:0;left:0;bottom:0;z-index:200;transform:translateX(-100%);box-shadow:4px 0 24px rgba(0,0,0,.12)}
  #sidebar.open{transform:translateX(0)}
  #main{height:auto;min-height:100vh;overflow:visible}
  .mob-menu{display:block}
  .topbar{position:sticky;top:0}
  .home-cards{grid-template-columns:1fr}
  .page{padding:20px 14px 80px}
}
</style>
</head>
<body>
 
<!-- ══ SIDEBAR ══ -->
<aside id="sidebar">
  <div class="sb-top">
    <div class="sb-logo">
      <svg class="logo-icon" viewBox="0 0 34 34" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="12" cy="17" r="10" fill="#F05A28"/>
        <circle cx="22" cy="17" r="10" fill="#F05A28" opacity="0.45"/>
      </svg>
      <span class="logo-txt">Baires<span>Dev</span></span>
    </div>
    <button class="new-btn" onclick="goHome()">+ New meeting</button>
  </div>
  <div class="sb-user" id="sb-user-row">
    <div class="user-avatar" id="sb-av">?</div>
    <span class="user-name" id="sb-un">Loading…</span>
    <button class="user-change" onclick="changeUser()">change</button>
  </div>
  <div class="sb-label">My sessions</div>
  <div class="sb-calls" id="sb-calls"></div>
</aside>
 
<!-- ══ MAIN ══ -->
<div id="main">
  <div class="topbar">
    <button class="mob-menu" onclick="toggleSb()">☰</button>
    <span class="topbar-title" id="tb-title">Meeting Hub</span>
    <span class="topbar-badge" id="tb-badge">PID 66 · STAFF AUG</span>
    <button class="back-btn" id="back-btn" onclick="goHome()" style="display:none">← Back</button>
  </div>
  <div id="vr"></div>
</div>
 
<!-- ══ USER MODAL ══ -->
<div class="modal-overlay" id="user-modal" style="display:none">
  <div class="modal">
    <div class="modal-logo">
      <svg width="36" height="36" viewBox="0 0 34 34" fill="none"><circle cx="12" cy="17" r="10" fill="#F05A28"/><circle cx="22" cy="17" r="10" fill="#F05A28" opacity="0.45"/></svg>
      <span style="font-size:18px;font-weight:700;letter-spacing:-.02em">Baires<span style="color:#F05A28">Dev</span></span>
    </div>
    <h2>Welcome to Meeting Hub</h2>
    <p>Enter your name to keep your sessions separate from your teammates. Your data is stored locally in your browser.</p>
    <input class="modal-input" id="mn-input" type="text" placeholder="Your full name…" maxlength="60">
    <button class="modal-btn" onclick="saveUser()">Get started →</button>
  </div>
</div>
 
<input type="file" id="file-upload" accept=".txt,.md,.text" style="display:none">
 
<script>
// ═══════════════════════════
// STATE
// ═══════════════════════════
let user=null, calls=[], view='home', editId=null, fs={}, teamRC=0;
 
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function fmtDate(d){
  if(!d)return'—';
  try{const dt=new Date(d);return isNaN(dt)?d:dt.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}
  catch{return d}
}
 
// ═══════════════════════════
// USER
// ═══════════════════════════
function loadUser(){const r=localStorage.getItem('bd_user');if(r){user=JSON.parse(r);return true;}return false;}
function saveUser(){
  const n=document.getElementById('mn-input').value.trim();if(!n)return;
  user={id:uid(),name:n};localStorage.setItem('bd_user',JSON.stringify(user));
  document.getElementById('user-modal').style.display='none';
  loadCalls();renderSb();renderView();
}
function changeUser(){
  if(!confirm('Switch user? Your sessions stay on this browser.'))return;
  document.getElementById('mn-input').value='';
  document.getElementById('user-modal').style.display='flex';
}
function loadCalls(){if(!user)return;const r=localStorage.getItem('bd_calls_'+user.id);calls=r?JSON.parse(r):[];}
function saveCalls(){if(!user)return;localStorage.setItem('bd_calls_'+user.id,JSON.stringify(calls));}
function deleteCall(id){if(!confirm('Delete this session?'))return;calls=calls.filter(c=>c.id!==id);saveCalls();renderSb();goHome();}
 
// ═══════════════════════════
// SIDEBAR
// ═══════════════════════════
function renderSb(){
  if(!user)return;
  const init=user.name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
  document.getElementById('sb-av').textContent=init;
  document.getElementById('sb-un').textContent=user.name;
  const c=document.getElementById('sb-calls');
  if(!calls.length){c.innerHTML=`<div class="sb-empty">No sessions yet.<br>Start a meeting above.</div>`;return;}
  c.innerHTML=[...calls].sort((a,b)=>new Date(b.savedAt)-new Date(a.savedAt)).map(x=>{
    const lbl=x.type==='ot'?(x.account||'Unnamed account'):(x.person||'Unnamed person');
    return`<div class="sb-item${editId===x.id?' active':''}" onclick="openDetail('${x.id}')">
      <span class="sb-type ${x.type}">${x.type.toUpperCase()}</span>
      <div class="sb-info"><div class="sb-name">${esc(lbl)}</div><div class="sb-date">${fmtDate(x.date||x.savedAt)}</div></div>
      <button class="sb-del" onclick="event.stopPropagation();deleteCall('${x.id}')" title="Delete">×</button>
    </div>`;
  }).join('');
}
 
// ═══════════════════════════
// ROUTER
// ═══════════════════════════
function renderView(){if(view==='home')renderHome();else if(view==='ot')renderOT();else if(view==='on')renderON();}
function goHome(){view='home';editId=null;fs={};renderSb();renderView();setTopbar('Meeting Hub','PID 66 · STAFF AUG',false);closeSb();}
function startOT(){view='ot';editId=null;fs={type:'ot',ans:{},erp:{},cmt:{},team:[],ins:[]};renderSb();renderView();setTopbar('Operational Touchpoint','OT · Staff Aug',true);closeSb();}
function startON(){view='on';editId=null;fs={type:'on',ans:{},cmt:{},ins:[]};renderSb();renderView();setTopbar('1:1 Check-in','1:1 · Team',true);closeSb();}
function openDetail(id){const c=calls.find(x=>x.id===id);if(!c)return;view='detail';editId=id;renderSb();renderDetail(c);setTopbar(c.type==='ot'?'Operational Touchpoint':'1:1 Check-in',c.type==='ot'?'OT · Staff Aug':'1:1 · Team',true);closeSb();}
function setTopbar(title,badge,back){document.getElementById('tb-title').textContent=title;document.getElementById('tb-badge').textContent=badge;document.getElementById('back-btn').style.display=back?'':'none';}
function toggleSb(){document.getElementById('sidebar').classList.toggle('open')}
function closeSb(){document.getElementById('sidebar').classList.remove('open')}
 
// ═══════════════════════════
// HOME
// ═══════════════════════════
function renderHome(){
  const name=user?user.name.split(' ')[0]:'';
  const sorted=[...calls].sort((a,b)=>new Date(b.savedAt)-new Date(a.savedAt)).slice(0,5);
  const recentHTML=sorted.length?sorted.map(c=>{
    const lbl=c.type==='ot'?(c.account||'Unnamed account'):(c.person||'Unnamed person');
    return`<div class="rec-item" onclick="openDetail('${c.id}')">
      <span class="rec-type ${c.type}">${c.type.toUpperCase()}</span>
      <div class="rec-info"><div class="rec-name">${esc(lbl)}</div><div class="rec-date">${fmtDate(c.date||c.savedAt)}</div></div>
      <span class="rec-arr">›</span>
    </div>`;
  }).join(''):`<div style="font-size:12px;color:var(--text3);padding:6px 0">No sessions yet. Start one above.</div>`;
  document.getElementById('vr').innerHTML=`<div class="page">
    <div class="home-greeting">
      <h1>Hello, <span>${esc(name)}</span> 👋</h1>
      <p>What would you like to record today?</p>
    </div>
    <div class="home-cards">
      <div class="hcard ot" onclick="startOT()">
        <div class="hcard-icon ot">📋</div>
        <div class="hcard-title">Operational Touchpoint</div>
        <div class="hcard-sub">Staff Augmentation PID 66 — client health, team performance, ERP checklist and farming.</div>
        <div class="hcard-cta ot">Start OT session →</div>
      </div>
      <div class="hcard on" onclick="startON()">
        <div class="hcard-icon on">👤</div>
        <div class="hcard-title">1:1 Check-in</div>
        <div class="hcard-sub">Internal team member 1:1 — mood, priorities, blockers, feedback and career development.</div>
        <div class="hcard-cta on">Start 1:1 session →</div>
      </div>
    </div>
    <div class="home-recent-lbl">Recent sessions</div>
    <div class="recent-list">${recentHTML}</div>
  </div>`;
}
 
// ═══════════════════════════
// OT FORM BUILDERS
// ═══════════════════════════
function qb(id,num,lbl,opts,ph='Add comments…'){
  return`<div class="qw">
    <div class="ql"><span class="qi">${num}</span>${lbl}</div>
    <div class="br">${opts.map(o=>`<button class="ab ${o.c}" data-q="${id}" data-v="${esc(o.v)}">${esc(o.v)}</button>`).join('')}</div>
    <textarea class="cmt" id="c-${id}" placeholder="${ph}"></textarea>
  </div>`;
}
function erb(id,lbl){return`<div class="er"><span class="el">${lbl}</span><div class="tg"><button class="tb yes" data-erp="${id}" data-v="Yes">YES</button><button class="tb no" data-erp="${id}" data-v="No">NO</button></div></div>`;}
 
function renderOT(){
  document.getElementById('vr').innerHTML=`<div class="page" id="ot-page">
  <div class="prog-wrap"><div class="prog-fill" id="prog" style="width:0%"></div></div>
  <div class="legend">
    <div class="leg"><div class="ld" style="background:var(--g)"></div>Good / On track</div>
    <div class="leg"><div class="ld" style="background:#D97706"></div>Caution / Monitor</div>
    <div class="leg"><div class="ld" style="background:var(--r)"></div>Risk / Action needed</div>
    <div class="leg"><div class="ld" style="background:var(--b)"></div>Informational</div>
  </div>
  <div class="meta-grid">
    <div class="fld"><label>Account Name</label><input type="text" id="f-account" placeholder="e.g. Acme Corp"></div>
    <div class="fld"><label>Focal Point</label><input type="text" id="f-focal" placeholder="e.g. Jane Smith"></div>
    <div class="fld"><label>Tier</label><select id="f-tier"><option value="">— Select —</option><option>Top 10%</option><option>Mid 30%</option><option>Bottom 60%</option></select></div>
    <div class="fld"><label>Date</label><input type="date" id="f-date"></div>
  </div>
 
  <!-- Transcript -->
  <div class="sc">
    <div class="sc-hdr"><span class="sc-tag">Prep</span><span class="sc-ttl">Previous Meeting Transcript</span></div>
    <div style="padding:14px 18px">
      <div class="txup"><label class="fl" for="file-upload">⊕ Upload .txt / .md</label><span class="fn" id="fnm">No file selected</span></div>
      <div class="tdiv">— OR PASTE BELOW —</div>
      <textarea class="txa" id="tx" placeholder="Paste transcript of your last meeting…" rows="4"></textarea>
      <button class="az-btn" id="az-btn" onclick="analyzeOT()">✦ Analyze with AI ↗</button>
      <div id="ins-area"></div>
    </div>
  </div>
 
  <!-- OPENING -->
  <div class="sc">
    <div class="sc-hdr"><span class="sc-tag">Opening</span><span class="sc-ttl">Meeting Opening</span></div>
    <div class="ph"><div class="ph-lbl">Warm-up prompt</div><div class="ph-txt">"How's everything going on your side this week?"</div></div>
    ${qb('q1','1.1','Was there small talk / ice breaker before the agenda?',[{c:'g',v:'Yes, meaningful connection'},{c:'y',v:'Brief but enough'},{c:'r',v:'No time for it'}])}
    ${qb('q2','1.2','Were action items from the previous meeting reviewed?',[{c:'g',v:'All reviewed'},{c:'y',v:'Partially reviewed'},{c:'r',v:'Not reviewed'},{c:'b',v:'First meeting'}])}
  </div>
 
  <!-- PERFORMANCE -->
  <div class="sc">
    <div class="sc-hdr"><span class="sc-tag">Topic 1</span><span class="sc-ttl">Team Performance</span></div>
    <div class="ph"><div class="ph-lbl">Team performance</div><div class="ph-txt">"How do you feel about the team's performance lately?"</div></div>
    <div class="qw">
      <div class="ql"><span class="qi">2.1</span>How is the client evaluating the team's performance? Are there pending evaluations?</div>
      <div class="br">
        <button class="ab g" data-q="q3" data-v="Up to date, positive feedback">Up to date, positive feedback</button>
        <button class="ab y" data-q="q3" data-v="Pending evaluations">Pending evaluations</button>
        <button class="ab r" data-q="q3" data-v="Complaints / potential LP">Complaints / potential LP</button>
        <button class="ab b" data-q="q3" data-v="New FP, first cycle">New FP, first cycle</button>
      </div>
      <div class="ttw">
        <table class="tt"><thead><tr>
          <th style="width:22%">Name</th><th style="width:16%">Role</th>
          <th>Client feedback</th><th style="width:88px">Sentiment</th><th style="width:32px"></th>
        </tr></thead><tbody id="ttbody"></tbody></table>
        <button class="add-row" onclick="addTR()">⊕ Add team member</button>
      </div>
      <textarea class="cmt" id="c-q3" placeholder="General performance notes…" style="margin-top:10px"></textarea>
    </div>
    ${qb('q4','2.2','Was a top performer highlighted to positively condition future evaluations?',[{c:'g',v:'Yes, reinforced positively'},{c:'y',v:'Not necessary this time'},{c:'r',v:'Not done'}])}
  </div>
 
  <!-- OPERATIONAL STATUS -->
  <div class="sc">
    <div class="sc-hdr"><span class="sc-tag">Topic 2</span><span class="sc-ttl">Operational Status</span></div>
    <div class="ph"><div class="ph-lbl">Quality & delivery</div><div class="ph-txt">"Are we meeting your expectations in terms of quality and speed?"</div></div>
    ${qb('q5','3.1','Are there new projects in the pipeline or existing ones that might end soon?',[{c:'g',v:'New projects coming'},{c:'y',v:'No changes for now'},{c:'r',v:'Project at risk of closing'}])}
    ${qb('q6','3.2','Is the team\'s quality meeting client expectations?',[{c:'g',v:'Satisfied with quality'},{c:'y',v:'Minor observations'},{c:'r',v:'Concrete complaints'}])}
    <div class="ph"><div class="ph-lbl">Communication & workflow</div><div class="ph-txt">"Is the communication between our teams working well, or would you like us to adjust anything?"</div></div>
    ${qb('q7','3.3','Were KPIs reviewed or proposed?',[{c:'g',v:'KPIs active and on track'},{c:'b',v:'New KPIs proposed'},{c:'y',v:'Pending alignment'},{c:'r',v:'Not addressed'}])}
    ${qb('q8','3.4','Is the workload balanced? Were overtime, on-call, or additional resources discussed?',[{c:'g',v:'Well balanced'},{c:'y',v:'Recurring overtime detected'},{c:'b',v:'Opportunity to add resources'},{c:'r',v:'Insufficient capacity'}])}
  </div>
 
  <!-- FARMING -->
  <div class="sc">
    <div class="sc-hdr"><span class="sc-tag">Farming</span><span class="sc-ttl">Farming Effort</span></div>
    <div class="ph"><div class="ph-lbl">Opportunities / Farming</div><div class="ph-txt">"Is there anything new coming up where we could support you or add more value?"</div></div>
    ${qb('q9','4.1','Was a farming effort made?',[{c:'g',v:'Yes — opportunity detected'},{c:'y',v:'Yes — asked, no result yet'},{c:'r',v:'No — project ending'},{c:'r',v:'No — critical payment situation'}],'Describe the opportunity or reason…')}
  </div>
 
  <!-- ERP -->
  <div class="sc">
    <div class="sc-hdr"><span class="sc-tag">ERP</span><span class="sc-ttl">Risks &amp; Opportunities Checklist</span></div>
    <div class="ph"><div class="ph-lbl">Risks or challenges</div><div class="ph-txt">"Have you noticed any blockers or concerns we should be aware of?"</div></div>
    <div style="height:6px"></div>
    ${erb('e1','Vacancies at risk')}
    ${erb('e2','Complaints about quality of candidates / developers')}
    ${erb('e3','Roll-off request due to low performance')}
    ${erb('e4','Mention of a new vendor')}
    ${erb('e5','Budget issues / potential layoffs mentioned')}
    ${erb('e6','Focal Point is leaving the company')}
    ${erb('e7','Project ending soon (planned or unplanned)')}
    ${erb('e8','New staffing opportunity identified')}
    <div class="ec"><textarea class="cmt" id="c-erp" placeholder="Additional detail on risks or opportunities…"></textarea></div>
  </div>
 
  <!-- RELATIONSHIP -->
  <div class="sc">
    <div class="sc-hdr"><span class="sc-tag">Relationship</span><span class="sc-ttl">Satisfaction &amp; Collaboration</span></div>
    <div class="ph"><div class="ph-lbl">Relationship / Satisfaction</div><div class="ph-txt">"How's the collaboration going overall? Anything we can do to make things easier for you?"</div></div>
    ${qb('q11','5.1','How would you rate the overall client relationship this cycle?',[{c:'g',v:'Strong — proactive and positive'},{c:'y',v:'Stable — no major issues'},{c:'r',v:'Tense — needs attention'},{c:'b',v:'New relationship — building trust'}])}
  </div>
 
  <!-- CLOSURE -->
  <div class="sc">
    <div class="sc-hdr"><span class="sc-tag">Closure</span><span class="sc-ttl">Next Steps</span></div>
    <div class="ph"><div class="ph-lbl">Closure / Next steps</div><div class="ph-txt">"Anything you'd like us to follow up on before our next call?"</div></div>
    ${qb('q10','6.1','Were action items summarized with owners and deadlines?',[{c:'g',v:'Yes, all defined'},{c:'y',v:'Partially'},{c:'r',v:'Not done'}],'Next steps, owners, deadlines…')}
  </div>
 
  <div class="save-bar">
    <span class="save-hint">Fill all sections then save to generate the ERP summary</span>
    <button class="save-btn" onclick="saveOT()">Save &amp; Generate Summary ↗</button>
  </div>
  </div>`;
 
  document.getElementById('f-date').value=new Date().toISOString().split('T')[0];
  teamRC=0; addTR();
  wireButtons();
  document.getElementById('file-upload').onchange=function(){
    const f=this.files[0];if(!f)return;
    document.getElementById('fnm').textContent=f.name;
    const r=new FileReader();r.onload=e=>{document.getElementById('tx').value=e.target.result;};r.readAsText(f);
  };
  document.querySelector('.fl').onclick=()=>document.getElementById('file-upload').click();
}
 
function wireButtons(){
  document.querySelectorAll('.ab').forEach(b=>{
    b.onclick=()=>{
      const q=b.dataset.q;
      document.querySelectorAll(`.ab[data-q="${q}"]`).forEach(x=>x.classList.remove('on'));
      b.classList.add('on');
      if(!fs.ans)fs.ans={};fs.ans[q]=b.dataset.v;updateProg();
    };
  });
  document.querySelectorAll('.tb').forEach(b=>{
    b.onclick=()=>{
      const e=b.dataset.erp;
      document.querySelectorAll(`.tb[data-erp="${e}"]`).forEach(x=>x.classList.remove('on'));
      b.classList.add('on');
      if(!fs.erp)fs.erp={};fs.erp[e]=b.dataset.v;updateProg();
    };
  });
  document.querySelectorAll('.rate-btn').forEach(b=>{
    b.onclick=()=>{document.querySelectorAll('.rate-btn').forEach(x=>x.classList.remove('on'));b.classList.add('on');fs.mood=parseInt(b.dataset.v);};
  });
}
function updateProg(){
  const tot=11+8, ans=Object.keys(fs.ans||{}).length+Object.keys(fs.erp||{}).length;
  const el=document.getElementById('prog');if(el)el.style.width=Math.round(ans/tot*100)+'%';
}
 
// Team rows
function addTR(){
  teamRC++;const n=teamRC;
  const tb=document.getElementById('ttbody');if(!tb)return;
  const tr=document.createElement('tr');tr.dataset.rid=n;
  tr.innerHTML=`<td><input class="ti" type="text" placeholder="Name…" data-f="name" data-r="${n}"></td>
    <td><input class="ti" type="text" placeholder="Role…" data-f="role" data-r="${n}"></td>
    <td><input class="ti" type="text" placeholder="Feedback…" data-f="fb" data-r="${n}"></td>
    <td><div class="sg">
      <button class="sb2 pos" data-r="${n}" data-s="positive" title="Positive">👍</button>
      <button class="sb2 neu" data-r="${n}" data-s="neutral" title="Neutral">➡️</button>
      <button class="sb2 neg" data-r="${n}" data-s="negative" title="Negative">👎</button>
    </div></td>
    <td><button class="rm" onclick="rmTR(this)">×</button></td>`;
  tb.appendChild(tr);
  tr.querySelectorAll('.sb2').forEach(b=>{
    b.onclick=()=>{tr.querySelectorAll('.sb2').forEach(x=>x.classList.remove('sel'));b.classList.add('sel');};
  });
}
function rmTR(b){const rows=document.querySelectorAll('#ttbody tr');if(rows.length<=1){alert('At least one row required.');return;}b.closest('tr').remove();}
function getTRs(){
  const rows=[];
  document.querySelectorAll('#ttbody tr').forEach(tr=>{
    const name=tr.querySelector('[data-f="name"]')?.value.trim();
    const role=tr.querySelector('[data-f="role"]')?.value.trim();
    const fb=tr.querySelector('[data-f="fb"]')?.value.trim();
    const sb=tr.querySelector('.sb2.sel');
    if(name||fb)rows.push({name:name||'—',role:role||'',feedback:fb||'—',sentiment:sb?sb.dataset.s:''});
  });
  return rows;
}
 
// ═══════════════════════════
// AI ANALYSIS
// ═══════════════════════════
async function analyzeOT(){
  const tx=(document.getElementById('tx')?.value||'').trim();
  if(!tx){alert('Paste or upload a transcript first.');return;}
  const btn=document.getElementById('az-btn');btn.disabled=true;btn.innerHTML='<div class="spinner"></div> Analyzing…';
  document.getElementById('ins-area').innerHTML=`<div class="analyzing"><div class="spinner"></div> Processing transcript…</div>`;
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,
        system:`You are an experienced BairesDev account manager reviewing a Staff Augmentation meeting transcript. Generate 5–8 concise actionable talking points for the NEXT meeting: open action items, client satisfaction signals, team performance feedback, risks (budget, attrition, vendors), growth/farming opportunities, communication gaps. Return ONLY a valid JSON array of strings. No markdown, no preamble. Max 120 chars per item.`,
        messages:[{role:'user',content:`Transcript:\n\n${tx}\n\nReturn as JSON array.`}]})
    });
    const data=await res.json();
    const raw=data.content?.find(b=>b.type==='text')?.text||'[]';
    const pts=JSON.parse(raw.trim().replace(/^```json|^```|```$/gm,'').trim());
    if(!Array.isArray(pts)||!pts.length)throw new Error();
    fs.ins=pts;
    document.getElementById('ins-area').innerHTML=`<div class="ib">
      <div class="ib-ttl">Talking points for this meeting</div>
      ${pts.map(p=>`<div class="ii"><span class="id2">›</span><span>${esc(p)}</span></div>`).join('')}
    </div>`;
  }catch(e){
    document.getElementById('ins-area').innerHTML=`<div class="ib" style="background:#FEF2F2;border-color:var(--r-b)">
      <div class="ib-ttl" style="color:var(--r)">Analysis failed</div>
      <div class="ii" style="color:var(--r)">Could not process transcript. Try again.</div></div>`;
  }finally{btn.disabled=false;btn.innerHTML='✦ Analyze with AI ↗';}
}

// SAVE OT
// ═══════════════════════════
const EL={e1:'Vacancies at risk',e2:'Complaints about quality of candidates / developers',e3:'Roll-off request due to low performance',e4:'Mention of a new vendor',e5:'Budget issues / potential layoffs mentioned',e6:'Focal Point is leaving the company',e7:'Project ending soon (planned or unplanned)',e8:'New staffing opportunity identified'};
 
function saveOT(){
  const C={};document.querySelectorAll('.cmt[id^="c-"]').forEach(el=>{if(el.value.trim())C[el.id]=el.value.trim();});
  const call={
    id:uid(),type:'ot',savedAt:new Date().toISOString(),
    account:document.getElementById('f-account')?.value.trim()||'',
    focal:document.getElementById('f-focal')?.value.trim()||'',
    tier:document.getElementById('f-tier')?.value||'',
    date:document.getElementById('f-date')?.value||'',
    ans:{...fs.ans},erp:{...fs.erp},cmt:C,
    teamRows:getTRs(),ins:fs.ins||[]
  };
  call.summary=buildOTSummary(call);
  calls.unshift(call);saveCalls();editId=call.id;renderSb();renderDetail(call);
  setTopbar('Operational Touchpoint','OT · Staff Aug',true);
}
 
function buildOTSummary(c){
  const hr='════════════════════════════════════════════',hr2='────────────────────────────────────────────';
  const A=c.ans||{},E=c.erp||{},C=c.cmt||{};
  const ln=(l,v,k)=>{let s=`- ${l}: ${v||'—'}`;if(k&&C[k])s+=`\n  → ${C[k]}`;return s;};
  const risks=Object.entries(E).filter(([k,v])=>v==='Yes'&&k!=='e8').map(([k])=>`  • ${EL[k]}`);
  const opps=Object.entries(E).filter(([k,v])=>v==='Yes'&&k==='e8').map(([k])=>`  • ${EL[k]}`);
  if(A.q9==='Yes — opportunity detected')opps.push(`  • Farming opportunity${C['c-q9']?': '+C['c-q9']:''}`);
  let tb='';
  if(c.teamRows?.length){tb='\n  Individual feedback:\n';c.teamRows.forEach(r=>{const s=r.sentiment==='positive'?'👍':r.sentiment==='negative'?'👎':r.sentiment==='neutral'?'➡️':'';tb+=`  • ${r.name}${r.role?' ('+r.role+')':''}: ${r.feedback}${s?' ['+s+']':''}\n`;});}
  let o=`${hr}\n  OPERATIONAL TOUCHPOINT — STAFF AUGMENTATION\n${hr}\n`;
  o+=`  Account    : ${c.account||'—'}\n  Focal Point: ${c.focal||'—'}\n  Tier       : ${c.tier||'—'}\n  Date       : ${c.date||'—'}\n${hr2}\n\n`;
  o+=`OPENING\n${hr2}\n${ln('Ice breaker / small talk',A.q1,'c-q1')}\n${ln('Previous action items',A.q2,'c-q2')}\n`;
  o+=`\nTOPIC 1 — PERFORMANCE\n${hr2}\n${ln('Team performance',A.q3,'')}${tb}`;
  if(C['c-q3'])o+=`  → ${C['c-q3']}\n`;
  o+=`${ln('Top performer highlighted',A.q4,'c-q4')}\n`;
  o+=`\nTOPIC 2 — OPERATIONAL STATUS\n${hr2}\n${ln('Pipeline / project risk',A.q5,'c-q5')}\n${ln('Quality vs. expectations',A.q6,'c-q6')}\n${ln('KPIs',A.q7,'c-q7')}\n${ln('Workload balance',A.q8,'c-q8')}\n`;
  o+=`\nFARMING\n${hr2}\n${ln('Farming effort',A.q9,'c-q9')}\n`;
  o+=`\nCLIENT RELATIONSHIP\n${hr2}\n${ln('Overall satisfaction',A.q11,'c-q11')}\n`;
  o+=`\nERP CHECKLIST\n${hr2}\n`;Object.entries(E).forEach(([k,v])=>{o+=`- ${EL[k]}: ${v}\n`;});
  if(C['c-erp'])o+=`  → ${C['c-erp']}\n`;
  o+=`\n${hr}\nRISKS IDENTIFIED    : ${risks.length?'\n'+risks.join('\n'):'None'}\nOPPORTUNITIES FOUND : ${opps.length?'\n'+opps.join('\n'):'None'}\n${hr}\n\n`;
  o+=`CLOSURE\n${hr2}\n${ln('Action items defined',A.q10,'c-q10')}\n`;
  return o;
}

}

  </div>`;
  document.getElementById('on-date').value=new Date().toISOString().split('T')[0];
  wireButtons();
  document.getElementById('file-upload').onchange=function(){const f=this.files[0];if(!f)return;document.getElementById('fnm').textContent=f.name;const r=new FileReader();r.onload=e=>{document.getElementById('tx').value=e.target.result;};r.readAsText(f);};

async function analyzeON(){
  const tx=(document.getElementById('tx')?.value||'').trim();
  if(!tx){alert('Paste or upload notes first.');return;}
  const btn=document.getElementById('az-btn');btn.disabled=true;btn.innerHTML='<div class="spinner"></div> Analyzing…';
  document.getElementById('ins-area').innerHTML=`<div class="analyzing"><div class="spinner"></div> Processing notes…</div>`;
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:900,
        system:`You are a manager reviewing previous 1:1 notes. Generate 4–6 talking points for the NEXT 1:1: unresolved action items, growth areas, performance feedback to give, engagement signals, blockers mentioned. Return ONLY a JSON array of strings. No markdown.`,
        messages:[{role:'user',content:`Notes:\n\n${tx}\n\nReturn as JSON array.`}]})
    });
    const data=await res.json();
    const raw=data.content?.find(b=>b.type==='text')?.text||'[]';
    const pts=JSON.parse(raw.trim().replace(/^```json|^```|```$/gm,'').trim());
    if(!Array.isArray(pts)||!pts.length)throw new Error();
    fs.ins=pts;
    document.getElementById('ins-area').innerHTML=`<div class="ib purple">
      <div class="ib-ttl">Talking points for this 1:1</div>
      ${pts.map(p=>`<div class="ii"><span class="id2">›</span><span>${esc(p)}</span></div>`).join('')}
    </div>`;
  }catch(e){
    document.getElementById('ins-area').innerHTML=`<div class="ib" style="background:#FEF2F2;border-color:var(--r-b)"><div class="ib-ttl" style="color:var(--r)">Analysis failed</div></div>`;
  }finally{btn.disabled=false;btn.innerHTML='✦ Analyze with AI ↗';}
}
 
function saveON(){
  const C={};document.querySelectorAll('.cmt[id^="c-"]').forEach(el=>{if(el.value.trim())C[el.id]=el.value.trim();});
  const mb=document.querySelector('.rate-btn.on');
  const call={
    id:uid(),type:'on',savedAt:new Date().toISOString(),
    person:document.getElementById('on-person')?.value.trim()||'',
    role:document.getElementById('on-role')?.value.trim()||'',
    date:document.getElementById('on-date')?.value||'',
    meetingNum:document.getElementById('on-num')?.value||'',
    ans:{...fs.ans},cmt:C,mood:mb?parseInt(mb.dataset.v):null,ins:fs.ins||[]
  };
  call.summary=buildONSummary(call);
  calls.unshift(call);saveCalls();editId=call.id;renderSb();renderDetail(call);
  setTopbar('1:1 Check-in','1:1 · Team',true);
}
 
function buildONSummary(c){
  const hr='════════════════════════════════════════════',hr2='────────────────────────────────────────────';
  const A=c.ans||{},C=c.cmt||{};
  const ln=(l,v,k)=>{let s=`- ${l}: ${v||'—'}`;if(k&&C[k])s+=`\n  → ${C[k]}`;return s;};
  let o=`${hr}\n  1:1 CHECK-IN — TEAM MEMBER\n${hr}\n`;
  o+=`  Team Member : ${c.person||'—'}\n  Role        : ${c.role||'—'}\n  Date        : ${c.date||'—'}\n  Meeting #   : ${c.meetingNum||'—'}\n${hr2}\n\n`;
  o+=`CHECK-IN\n${hr2}\n- Mood / energy: ${c.mood?c.mood+'/10':'—'}\n`;
  if(C['c-on1'])o+=`  → ${C['c-on1']}\n`;
  o+=`\nWORK & PRIORITIES\n${hr2}\n${ln('Projects & priorities',A['on-q1'],'c-on-q1')}\n${ln('Priority shifts',A['on-q2'],'c-on-q2')}\n`;
  o+=`\nBLOCKERS & SUPPORT\n${hr2}\n${ln('Blockers',A['on-q3'],'c-on-q3')}\n${ln('Company support',A['on-q4'],'c-on-q4')}\n`;
  o+=`\nPERFORMANCE & FEEDBACK\n${hr2}\n${ln('Performance vs. goals',A['on-q5'],'c-on-q5')}\n`;
  if(C['c-on-fb'])o+=`- Upward feedback:\n  → ${C['c-on-fb']}\n`;
  o+=`\nGROWTH & DEVELOPMENT\n${hr2}\n${ln('Career development',A['on-q6'],'c-on-q6')}\n${ln('Engagement / retention',A['on-q7'],'c-on-q7')}\n`;
  o+=`\n${hr}\nCLOSURE\n${hr2}\n${ln('Action items',A['on-q8'],'c-on-q8')}\n`;
  return o;
}

  </div>

  <div class="sum-wrap">
    <div class="sum-hdr">
      <span class="sum-ttl">Generated Summary</span>
      <div style="display:flex;gap:6px">
        <button class="copy-btn" id="cp-btn" onclick="copySum()">Copy</button>
        <button class="del-btn" onclick="deleteCall('${c.id}')">Delete</button>
      </div>

  </div>

}
 
function copySum(){
  const t=document.getElementById('sum-out')?.textContent||'';
  navigator.clipboard.writeText(t).then(()=>{
    const b=document.getElementById('cp-btn');b.textContent='Copied ✓';b.classList.add('ok');
    setTimeout(()=>{b.textContent='Copy';b.classList.remove('ok');},2400);
  });
}
